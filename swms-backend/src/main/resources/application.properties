# ============================================================
# DATA SOURCE — MySQL connection
# ============================================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Clever Cloud DEV plan allows max 5 connections — stay within limit
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1

# ============================================================
# JPA / HIBERNATE
# ddl-auto=update  →  Hibernate creates / alters tables on startup.
# For production use 'validate' or Flyway migrations.
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# JACKSON — serialize LocalDateTime as ISO string, not array.
# Without this, LocalDateTime fields like ChatResponse.timestamp
# serialize as [2026, 3, 2, 12, 0, 0] instead of "2026-03-02T12:00:00"
# ============================================================
spring.jackson.serialization.write-dates-as-timestamps=false

# ============================================================
# JWT CONFIGURATION
# Secret must be >= 256 bits (32 bytes) for HS256.
# Expiration = 24 hours in milliseconds.
# ============================================================
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS}

# ============================================================
# SERVER
# ============================================================
server.port=8080

# ============================================================
# LOGGING
# ============================================================
logging.level.com.swms=DEBUG
logging.level.org.springframework.security=DEBUG

# ============================================================
# AI CONFIGURATION  *** ACTION REQUIRED ***
#
# You MUST replace the api-key below with a real key or the server
# will refuse to start (AIClientService @PostConstruct validates it).
#
# OPTION A — OpenAI (paid, best quality)
#   Get key: https://platform.openai.com/api-keys
#   app.ai.openai.api-key=sk-...your-real-key...
#
# OPTION B — Gemini via OpenAI-compatible endpoint (free tier available)
#   Get key: https://aistudio.google.com/app/apikey
#   app.ai.openai.api-key=AIza...your-gemini-key...
#   app.ai.openai.model=gemini-2.0-flash
#   app.ai.openai.api-url=https://generativelanguage.googleapis.com/v1beta/openai/chat/completions
# ============================================================
app.ai.provider=${AI_PROVIDER}
app.ai.openai.api-key=${AI_API_KEY}
app.ai.openai.model=${AI_MODEL}
app.ai.openai.api-url=${AI_API_URL}
# Maximum previous chat turns to include as memory (keep low to control token cost)
app.ai.conversation.memory-turns=${AI_MEMORY_TURNS}
